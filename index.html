<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌭 Bratwurst Frühwarnsystem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 95%;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 40px;
            text-align: center;
            color: white;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            font-size: 1em;
            opacity: 0.95;
        }
        
        .search-box {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }
        
        .search-container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }
        
        #searchInput {
            width: 100%;
            padding: 12px 45px 12px 15px;
            font-size: 16px;
            border: 2px solid #dee2e6;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s;
        }
        
        #searchInput:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
        }
        
        .content {
            padding: 20px;
            overflow-x: auto;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #6c757d;
            margin-top: 5px;
            font-size: 0.9em;
        }
        
        .table-wrapper {
            overflow-x: auto;
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 800px;
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 8px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        th:first-child {
            border-radius: 8px 0 0 0;
        }
        
        th:last-child {
            border-radius: 0 8px 0 0;
        }
        
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #e9ecef;
            vertical-align: top;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        tr.hidden {
            display: none;
        }
        
        .date-cell {
            font-weight: bold;
            color: #495057;
            white-space: nowrap;
            min-width: 120px;
        }
        
        .weekday {
            color: #667eea;
            display: block;
            font-size: 0.9em;
        }
        
        .mensa-cell {
            padding: 8px;
        }
        
        .kategorie-title {
            font-weight: bold;
            color: #667eea;
            font-size: 0.85em;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        .dish {
            padding: 6px 8px;
            margin: 4px 0;
            background: #f8f9fa;
            border-radius: 5px;
            border-left: 3px solid #667eea;
            font-size: 0.95em;
            line-height: 1.3;
        }
        
        .dish .price {
            float: right;
            color: #a3a3a3;
            font-weight: bold;
            font-size: 0.85em;
            margin-left: 8px;
        }
        
        .dish.bratwurst {
            background: #fff3cd;
            border-left-color: #ff6b6b;
            font-weight: bold;
        }
        
        .dish.bratwurst::before {
            content: '🌭 ';
        }
        
        .dish.highlight-search {
            background: #d4edda;
            border-left-color: #28a745;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(40, 167, 69, 0.3);
            transform: scale(1.02);
            transition: all 0.3s;
        }
        
        .dish.bratwurst.highlight-search {
            background: #ffeb3b;
            border-left-color: #ff6b6b;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.4);
        }
        
        .empty-cell {
            color: #adb5bd;
            font-style: italic;
            text-align: center;
        }
        
        footer {
            background: #343a40;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 0.85em;
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-size: 1.2em;
            display: none;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .stat-number { font-size: 1.5em; }
            table { font-size: 12px; }
            th, td { padding: 8px 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌭 Bratwurst Frühwarnsystem</h1>
            <div class="subtitle">Berliner Mensen-Speiseplan (Aktionen & Essen) | Aktualisiert: 07.05.2026 07:45</div>
        </header>
        
        <div class="search-box">
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Suche nach Gerichten... (z.B. 'Bratwurst', 'Schnitzel', 'vegan')"
                    autocomplete="off"
                >
                <span class="search-icon">🔍</span>
            </div>
        </div>
        
        <div class="content">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number">0</div>
                    <div class="stat-label">Gerichte gesamt</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">0</div>
                    <div class="stat-label">Tage</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">0</div>
                    <div class="stat-label">🌭 Bratwürste</div>
                </div>
            </div>
            
            <div class="table-wrapper">
                <table id="mensaTable">
                    <thead>
                        <tr>
                            <th>Datum</th>
                            <th>HU Nord</th>
                            <th>HU Süd</th>
                            <th>TU Hardenbergstraße</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
            
            <div id="noResults" class="no-results">
                😕 Keine Gerichte gefunden. Versuche eine andere Suche!
            </div>
        </div>
        
        <footer>
            <p>Daten von www.stw.berlin</p>
        </footer>
    </div>
    
    <script>
        // Suchfunktion mit Highlighting
        const searchInput = document.getElementById('searchInput');
        const tableRows = document.querySelectorAll('#mensaTable tbody tr');
        const allDishes = document.querySelectorAll('.dish');
        const noResults = document.getElementById('noResults');
        const tableWrapper = document.querySelector('.table-wrapper');
        
        searchInput.addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase().trim();
            let visibleRows = 0;
            
            // Entferne alle Highlights
            allDishes.forEach(dish => {
                dish.classList.remove('highlight-search');
            });
            
            tableRows.forEach(row => {
                if (searchTerm === '') {
                    // Keine Suche: Alle Zeilen anzeigen
                    row.classList.remove('hidden');
                    visibleRows++;
                } else {
                    // Finde alle Gerichte in dieser Zeile
                    const dishes = row.querySelectorAll('.dish');
                    let hasMatch = false;
                    
                    dishes.forEach(dish => {
                        const dishText = dish.textContent.toLowerCase();
                        if (dishText.includes(searchTerm)) {
                            // Gericht gefunden: highlighten
                            dish.classList.add('highlight-search');
                            hasMatch = true;
                        }
                    });
                    
                    // Zeile nur anzeigen, wenn mindestens ein Gericht matched
                    if (hasMatch) {
                        row.classList.remove('hidden');
                        visibleRows++;
                    } else {
                        row.classList.add('hidden');
                    }
                }
            });
            
            if (visibleRows === 0) {
                noResults.style.display = 'block';
                tableWrapper.style.display = 'none';
            } else {
                noResults.style.display = 'none';
                tableWrapper.style.display = 'block';
            }
        });
        
        // Enter-Taste
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
